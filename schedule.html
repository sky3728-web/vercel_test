<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2026 학사일정</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f1f5f9;
      --surface: #fff;
      --text: #0f172a;
      --muted: #64748b;
      --line: #e2e8f0;
      --blue: #1d4ed8;
      --blue-soft: #dbeafe;
      --green: #059669;
      --green-soft: #d1fae5;
      --amber: #d97706;
      --amber-soft: #fef3c7;
      --rose: #e11d48;
      --rose-soft: #ffe4e6;
      --violet: #7c3aed;
      --shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
      --radius: 14px;
    }

    body {
      font-family: "Pretendard", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.55;
    }

    .wrap {
      max-width: 1120px;
      margin: 0 auto;
      padding: 1.5rem 1rem 3rem;
    }

    .topbar {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      align-items: flex-end;
      justify-content: space-between;
      margin-bottom: 1.25rem;
    }

    h1 {
      font-size: clamp(1.6rem, 4vw, 2.2rem);
      letter-spacing: -0.03em;
      color: var(--blue);
    }

    .today-box {
      padding: 0.65rem 1rem;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--surface);
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--muted);
    }

    .today-box strong { color: var(--rose); }

    .hero {
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 1rem;
      margin-bottom: 1rem;
    }

    .panel {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: calc(var(--radius) + 2px);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .panel-head {
      padding: 0.9rem 1rem;
      border-bottom: 1px solid var(--line);
      background: #fafbfd;
    }

    .panel-head h2 {
      font-size: 0.98rem;
      color: var(--blue);
    }

    .panel-head p {
      margin-top: 0.15rem;
      font-size: 0.8rem;
      color: var(--muted);
    }

    .now-list {
      padding: 0.85rem;
      display: grid;
      gap: 0.65rem;
    }

    .now-card {
      padding: 0.85rem 0.95rem;
      border-radius: 12px;
      border: 1px solid var(--green-soft);
      background: #f0fdf4;
    }

    .now-card .title {
      font-size: 1.05rem;
      font-weight: 800;
    }

    .now-card .date {
      margin-top: 0.2rem;
      color: var(--muted);
      font-size: 0.86rem;
      font-weight: 600;
    }

    .now-card .bar {
      margin-top: 0.55rem;
      height: 6px;
      border-radius: 999px;
      background: #bbf7d0;
      overflow: hidden;
    }

    .now-card .bar span {
      display: block;
      height: 100%;
      border-radius: inherit;
      background: var(--green);
    }

    .next-list {
      padding: 0.85rem;
      display: grid;
      gap: 0.55rem;
    }

    .next-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.7rem 0.85rem;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fff;
    }

    .dday {
      flex-shrink: 0;
      min-width: 3.2rem;
      text-align: center;
      padding: 0.35rem 0.45rem;
      border-radius: 10px;
      background: var(--blue-soft);
      color: var(--blue);
      font-size: 0.78rem;
      font-weight: 800;
      line-height: 1.2;
    }

    .next-item .info .title {
      font-weight: 800;
      font-size: 0.92rem;
    }

    .next-item .info .date {
      margin-top: 0.1rem;
      font-size: 0.78rem;
      color: var(--muted);
      font-weight: 600;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }

    .chip {
      border: 1px solid var(--line);
      background: var(--surface);
      color: var(--muted);
      border-radius: 999px;
      padding: 0.42rem 0.85rem;
      font: inherit;
      font-size: 0.82rem;
      font-weight: 700;
      cursor: pointer;
    }

    .chip.active {
      background: var(--blue);
      border-color: var(--blue);
      color: #fff;
    }

    .main-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      margin-bottom: 1rem;
    }

    .calendar {
      padding: 0.85rem;
    }

    .cal-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.75rem;
    }

    .cal-nav button {
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 8px;
      width: 2rem;
      height: 2rem;
      cursor: pointer;
      font-weight: 800;
      color: var(--blue);
    }

    .cal-nav h3 {
      font-size: 1rem;
      color: var(--text);
    }

    .cal-weekdays,
    .cal-days {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 0.3rem;
    }

    .cal-weekdays span {
      text-align: center;
      font-size: 0.72rem;
      font-weight: 800;
      color: var(--muted);
      padding: 0.2rem 0;
    }

    .cal-weekdays span:first-child { color: var(--rose); }
    .cal-weekdays span:last-child { color: var(--blue); }

    .day {
      min-height: 4.2rem;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 0.25rem;
      background: #fafbfd;
    }

    .day.empty { visibility: hidden; }

    .day.today {
      border-color: var(--rose);
      background: var(--rose-soft);
    }

    .day-num {
      font-size: 0.72rem;
      font-weight: 800;
      color: var(--muted);
      margin-bottom: 0.15rem;
    }

    .day.today .day-num { color: var(--rose); }

    .dot {
      display: block;
      width: 100%;
      margin-top: 0.12rem;
      padding: 0.1rem 0.2rem;
      border-radius: 4px;
      font-size: 0.58rem;
      font-weight: 700;
      color: #fff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .schedule-list {
      padding: 0.85rem;
      max-height: 520px;
      overflow: auto;
      display: grid;
      gap: 0.55rem;
    }

    .event {
      border: 1px solid var(--line);
      border-left: 4px solid var(--blue);
      border-radius: 12px;
      padding: 0.75rem 0.85rem;
      background: #fff;
    }

    .event.active { background: #f0fdf4; border-left-color: var(--green); }
    .event.upcoming { background: #eff6ff; border-left-color: var(--blue); }
    .event.ended { opacity: 0.65; border-left-color: #94a3b8; }

    .event-top {
      display: flex;
      justify-content: space-between;
      gap: 0.5rem;
      align-items: flex-start;
    }

    .event-title {
      font-weight: 800;
      font-size: 0.95rem;
    }

    .tag {
      flex-shrink: 0;
      font-size: 0.68rem;
      font-weight: 800;
      padding: 0.15rem 0.45rem;
      border-radius: 999px;
      background: var(--line);
      color: var(--muted);
    }

    .tag.active { background: var(--green-soft); color: var(--green); }
    .tag.upcoming { background: var(--blue-soft); color: var(--blue); }
    .tag.ended { background: #f1f5f9; color: #94a3b8; }

    .event-date {
      margin-top: 0.25rem;
      font-size: 0.82rem;
      color: var(--muted);
      font-weight: 600;
    }

    .event-meta {
      margin-top: 0.35rem;
      font-size: 0.75rem;
      color: var(--muted);
      font-weight: 700;
    }

    .timeline-panel { margin-bottom: 1rem; }

    .timeline {
      padding: 1rem;
      overflow-x: auto;
    }

    .timeline-scale {
      display: grid;
      grid-template-columns: 8.5rem 1fr;
      gap: 0.75rem;
      margin-bottom: 0.35rem;
      font-size: 0.72rem;
      font-weight: 800;
      color: var(--muted);
    }

    .scale-track {
      position: relative;
      height: 1.2rem;
      border-bottom: 1px solid var(--line);
    }

    .scale-mark {
      position: absolute;
      bottom: 0;
      transform: translateX(-50%);
      white-space: nowrap;
    }

    .timeline-row {
      display: grid;
      grid-template-columns: 8.5rem 1fr;
      gap: 0.75rem;
      align-items: center;
      min-height: 2.2rem;
      padding: 0.25rem 0;
    }

    .timeline-name {
      font-size: 0.82rem;
      font-weight: 700;
      line-height: 1.3;
    }

    .track {
      position: relative;
      height: 1rem;
      background: #eef2f7;
      border-radius: 999px;
    }

    .track-bar {
      position: absolute;
      top: 0;
      height: 100%;
      border-radius: 999px;
      min-width: 4px;
    }

    .track-today {
      position: absolute;
      top: -0.25rem;
      bottom: -0.25rem;
      width: 2px;
      background: var(--rose);
      z-index: 2;
    }

    .empty {
      padding: 1.5rem;
      text-align: center;
      color: var(--muted);
      font-size: 0.9rem;
    }

    footer {
      text-align: center;
      color: var(--muted);
      font-size: 0.78rem;
    }

    footer a { color: var(--blue); }

    @media (max-width: 860px) {
      .hero, .main-grid { grid-template-columns: 1fr; }
      .schedule-list { max-height: none; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div>
        <h1>2026 학사일정</h1>
      </div>
      <div class="today-box" id="todayBox"></div>
    </div>

    <section class="hero">
      <article class="panel">
        <div class="panel-head">
          <h2>지금 진행 중</h2>
          <p>오늘 해당되는 일정</p>
        </div>
        <div class="now-list" id="nowList"></div>
      </article>
      <article class="panel">
        <div class="panel-head">
          <h2>다가오는 일정</h2>
          <p>시작일이 가까운 순서</p>
        </div>
        <div class="next-list" id="nextList"></div>
      </article>
    </section>

    <div class="toolbar" id="categoryFilter"></div>

    <section class="main-grid">
      <article class="panel">
        <div class="panel-head">
          <h2>월간 캘린더</h2>
          <p>날짜별 일정 확인</p>
        </div>
        <div class="calendar">
          <div class="cal-nav">
            <button type="button" id="prevMonth" aria-label="이전 달">‹</button>
            <h3 id="monthLabel"></h3>
            <button type="button" id="nextMonth" aria-label="다음 달">›</button>
          </div>
          <div class="cal-weekdays">
            <span>일</span><span>월</span><span>화</span><span>수</span><span>목</span><span>금</span><span>토</span>
          </div>
          <div class="cal-days" id="calDays"></div>
        </div>
      </article>

      <article class="panel">
        <div class="panel-head">
          <h2>전체 일정</h2>
          <p>기간 · 상태 · 분류</p>
        </div>
        <div class="schedule-list" id="scheduleList"></div>
      </article>
    </section>

    <article class="panel timeline-panel">
      <div class="panel-head">
        <h2>6~8월 타임라인</h2>
        <p>일정 길이와 겹침을 한눈에</p>
      </div>
      <div class="timeline" id="timeline"></div>
    </article>

    <footer>
      데이터: <a href="https://docs.google.com/spreadsheets/d/1X91WAh_sG2gT1S9fdY5GaCvFpkBlssQh/edit" target="_blank" rel="noopener">2026_학사일정 스프레드시트</a>
    </footer>
  </div>

  <script>
    const RAW = [
      { start: "2026-06-09", end: "2026-06-15", title: "기말고사", cat: "exam" },
      { start: "2026-06-16", end: "2026-06-22", title: "보강기간", cat: "class" },
      { start: "2026-06-22", end: "2026-07-03", title: "재입학 신청기간", cat: "enroll" },
      { start: "2026-06-23", end: "2026-07-06", title: "하계 계절학기", cat: "class" },
      { start: "2026-06-23", end: "2026-08-31", title: "미등록 휴학기간", cat: "enroll" },
      { start: "2026-06-23", end: "2026-06-23", title: "하계방학", cat: "break" },
      { start: "2026-06-25", end: "2026-06-30", title: "성적공시 및 정정", cat: "grade" },
      { start: "2026-07-13", end: "2026-08-31", title: "휴학연기 신청기간", cat: "enroll" },
      { start: "2026-07-13", end: "2026-07-17", title: "복학기간", cat: "enroll" },
      { start: "2026-07-29", end: "2026-07-31", title: "예비수강 신청기간", cat: "class" }
    ];

    const CATS = {
      all: "전체",
      exam: "시험",
      class: "수업·수강",
      enroll: "학적",
      grade: "성적",
      break: "방학"
    };

    const COLORS = {
      exam: "#e11d48",
      class: "#1d4ed8",
      enroll: "#7c3aed",
      grade: "#d97706",
      break: "#059669"
    };

    const RANGE = { start: "2026-06-01", end: "2026-08-31" };

    const state = { filter: "all", month: new Date(2026, 6, 1) };

    function parse(s) {
      const p = s.split("-").map(Number);
      return new Date(p[0], p[1] - 1, p[2]);
    }

    function fmt(s) {
      const d = parse(s);
      return d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0") + "-" + String(d.getDate()).padStart(2, "0");
    }

    function fmtKo(s) {
      return parse(s).toLocaleDateString("ko-KR", { month: "long", day: "numeric", weekday: "short" });
    }

    function days(a, b) {
      return Math.round((parse(b) - parse(a)) / 86400000);
    }

    function status(ev, today) {
      if (today >= ev.start && today <= ev.end) return "active";
      if (today < ev.start) return "upcoming";
      return "ended";
    }

    function dday(ev, today) {
      const diff = days(today, ev.start);
      if (diff === 0) return "D-Day";
      if (diff > 0) return "D-" + diff;
      return "D+" + Math.abs(diff);
    }

    function progress(ev, today) {
      const total = days(ev.start, ev.end) + 1;
      if (today < ev.start) return 0;
      if (today > ev.end) return 100;
      return Math.round(((days(ev.start, today) + 1) / total) * 100);
    }

    function enrich(today) {
      return RAW.map(function (ev, i) {
        return Object.assign({}, ev, {
          id: i,
          status: status(ev, today),
          color: COLORS[ev.cat],
          duration: days(ev.start, ev.end) + 1
        });
      }).sort(function (a, b) { return a.start.localeCompare(b.start); });
    }

    function filtered(events) {
      if (state.filter === "all") return events;
      return events.filter(function (e) { return e.cat === state.filter; });
    }

    function renderToday(today) {
      const d = parse(today);
      document.getElementById("todayBox").innerHTML =
        "오늘 <strong>" + d.toLocaleDateString("ko-KR", { year: "numeric", month: "long", day: "numeric", weekday: "long" }) + "</strong>";
    }

    function renderNow(events, today) {
      const active = events.filter(function (e) { return e.status === "active"; });
      const el = document.getElementById("nowList");
      if (!active.length) {
        el.innerHTML = '<div class="empty">현재 진행 중인 일정이 없습니다.</div>';
        return;
      }
      el.innerHTML = active.map(function (ev) {
        const pct = progress(ev, today);
        return (
          '<div class="now-card">' +
            '<div class="title">' + ev.title + '</div>' +
            '<div class="date">' + fmtKo(ev.start) + " ~ " + fmtKo(ev.end) + " · " + pct + "% 진행</div>" +
            '<div class="bar"><span style="width:' + pct + '%"></span></div>' +
          '</div>'
        );
      }).join("");
    }

    function renderNext(events) {
      const upcoming = events.filter(function (e) { return e.status === "upcoming"; }).slice(0, 4);
      const el = document.getElementById("nextList");
      if (!upcoming.length) {
        el.innerHTML = '<div class="empty">예정된 일정이 없습니다.</div>';
        return;
      }
      const today = fmt(new Date());
      el.innerHTML = upcoming.map(function (ev) {
        return (
          '<div class="next-item">' +
            '<div class="dday">' + dday(ev, today) + '</div>' +
            '<div class="info">' +
              '<div class="title">' + ev.title + '</div>' +
              '<div class="date">' + ev.start + " ~ " + ev.end + "</div>" +
            '</div>' +
          '</div>'
        );
      }).join("");
    }

    function renderFilters() {
      document.getElementById("categoryFilter").innerHTML = Object.keys(CATS).map(function (key) {
        return '<button type="button" class="chip' + (state.filter === key ? " active" : "") + '" data-cat="' + key + '">' + CATS[key] + '</button>';
      }).join("");
    }

    function renderCalendar(events, today) {
      const y = state.month.getFullYear();
      const m = state.month.getMonth();
      document.getElementById("monthLabel").textContent = y + "년 " + (m + 1) + "월";

      const first = new Date(y, m, 1);
      const last = new Date(y, m + 1, 0);
      const offset = first.getDay();
      let html = "";

      for (let i = 0; i < offset; i++) html += '<div class="day empty"></div>';

      for (let d = 1; d <= last.getDate(); d++) {
        const ds = y + "-" + String(m + 1).padStart(2, "0") + "-" + String(d).padStart(2, "0");
        const dayEvents = events.filter(function (ev) { return ds >= ev.start && ds <= ev.end; });
        html += '<div class="day' + (ds === today ? " today" : "") + '">' +
          '<div class="day-num">' + d + '</div>' +
          dayEvents.slice(0, 2).map(function (ev) {
            return '<span class="dot" style="background:' + ev.color + '">' + ev.title + '</span>';
          }).join("") +
          (dayEvents.length > 2 ? '<span class="dot" style="background:#64748b">+' + (dayEvents.length - 2) + '</span>' : "") +
        '</div>';
      }

      document.getElementById("calDays").innerHTML = html;
    }

    function renderList(events) {
      const el = document.getElementById("scheduleList");
      if (!events.length) {
        el.innerHTML = '<div class="empty">해당 분류의 일정이 없습니다.</div>';
        return;
      }
      el.innerHTML = events.map(function (ev) {
        const label = ev.status === "active" ? "진행 중" : ev.status === "upcoming" ? "예정" : "종료";
        return (
          '<article class="event ' + ev.status + '">' +
            '<div class="event-top">' +
              '<div class="event-title">' + ev.title + '</div>' +
              '<span class="tag ' + ev.status + '">' + label + '</span>' +
            '</div>' +
            '<div class="event-date">' + ev.start + " ~ " + ev.end + '</div>' +
            '<div class="event-meta">' + CATS[ev.cat] + " · " + ev.duration + "일</div>" +
          '</article>'
        );
      }).join("");
    }

    function renderTimeline(events, today) {
      const total = days(RANGE.start, RANGE.end) + 1;
      const marks = [1, 15, total];
      const monthNames = ["6월", "7월", "8월"];

      let scale = marks.map(function (day, i) {
        const left = ((day - 1) / (total - 1)) * 100;
        return '<span class="scale-mark" style="left:' + left + '%">' + (monthNames[Math.min(i, 2)] || "") + " " + day + "일</span>";
      }).join("");

      const todayLeft = days(RANGE.start, today) / (total - 1) * 100;
      const showToday = today >= RANGE.start && today <= RANGE.end;

      const rows = events.map(function (ev) {
        const s = ev.start < RANGE.start ? RANGE.start : ev.start;
        const e = ev.end > RANGE.end ? RANGE.end : ev.end;
        if (e < RANGE.start || s > RANGE.end) return "";
        const left = (days(RANGE.start, s) / total) * 100;
        const width = ((days(s, e) + 1) / total) * 100;
        return (
          '<div class="timeline-row">' +
            '<div class="timeline-name">' + ev.title + '</div>' +
            '<div class="track">' +
              (showToday ? '<span class="track-today" style="left:' + todayLeft + '%"></span>' : "") +
              '<span class="track-bar" style="left:' + left + '%;width:' + width + '%;background:' + ev.color + ';"></span>' +
            '</div>' +
          '</div>'
        );
      }).join("");

      document.getElementById("timeline").innerHTML =
        '<div class="timeline-scale"><span>일정</span><div class="scale-track">' + scale + '</div></div>' + rows;
    }

    function renderAll() {
      const today = fmt(new Date());
      const events = enrich(today);
      const list = filtered(events);

      renderToday(today);
      renderNow(events, today);
      renderNext(events);
      renderFilters();
      renderCalendar(list, today);
      renderList(list);
      renderTimeline(list, today);
    }

    document.getElementById("categoryFilter").addEventListener("click", function (e) {
      const btn = e.target.closest(".chip");
      if (!btn) return;
      state.filter = btn.dataset.cat;
      renderAll();
    });

    document.getElementById("prevMonth").addEventListener("click", function () {
      state.month = new Date(state.month.getFullYear(), state.month.getMonth() - 1, 1);
      renderAll();
    });

    document.getElementById("nextMonth").addEventListener("click", function () {
      state.month = new Date(state.month.getFullYear(), state.month.getMonth() + 1, 1);
      renderAll();
    });

    renderAll();
  </script>
</body>
</html>
